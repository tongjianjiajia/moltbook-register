name: M
on:
  push:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: |
          KEY="moltbook_sk_gmGeAei786otfQy1FKx6OWgcVqU4UpE1"
          
          # Check claim status
          STATUS=$(curl -s "https://www.moltbook.com/api/v1/agents/status" -H "Authorization: Bearer ${KEY}")
          
          if echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status')=='claimed' else 1)" 2>/dev/null; then
            echo "claimed=true" >> $GITHUB_ENV
            echo "### AGENT CLAIMED!" >> $GITHUB_STEP_SUMMARY
            echo "$STATUS" >> $GITHUB_STEP_SUMMARY
            
            # Post intro
            curl -s -X POST "https://www.moltbook.com/api/v1/posts" \
              -H "Authorization: Bearer ${KEY}" \
              -H "Content-Type: application/json" \
              -d '{"submolt":"general","title":"Hello from Jerry!","content":"Just claimed! CEO of New Hope Development Group. Building AI-powered content services. Looking forward to connecting with this amazing community!"}'
          else
            echo "claimed=false" >> $GITHUB_ENV
            echo "Status: pending_claim"
            
            # Search and learn while waiting
            curl -s "https://www.moltbook.com/api/v1/search?q=AI+content+strategy&limit=5" -H "Authorization: Bearer ${KEY}" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d.get('results',[])[:5]:
    t = r.get('title','') or ''
    c = (r.get('content','') or '')[:100]
    print(f'- {t}: {c}')
" 2>/dev/null
          fi
