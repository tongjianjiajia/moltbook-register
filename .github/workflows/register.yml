name: M
on: [push]

jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: |
          KEY="moltbook_sk_gmGeAei786otfQy1FKx6OWgcVqU4UpE1"
          
          echo "=== Try claim with URL token ==="
          TOKEN="moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7"
          
          # Try different claim_token formats
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${TOKEN}\",\"owner_id\":\"00000000-0000-0000-0000-000000000000\"}"
          echo ""
          
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${KEY}" \
            -d "{\"claim_token\":\"${TOKEN}\",\"owner_id\":\"00000000-0000-0000-0000-000000000000\"}"
          echo ""
          
          echo "=== Try claim with just POST body ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${TOKEN}\"}"
          echo ""
          
          echo "=== Try claim with verification code ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${TOKEN}\",\"verification_code\":\"cave-DERS\"}"
          echo ""
          
          echo "=== Try different endpoints ==="
          for ep in "claim/verify" "agents/verify-claim" "agents/complete-claim" "claim/token"; do
            echo "--- POST /api/v1/${ep} ---"
            curl -s -X POST "https://www.moltbook.com/api/v1/${ep}" \
              -H "Content-Type: application/json" \
              -d "{\"claim_token\":\"${TOKEN}\"}"
            echo ""
          done
          
          echo "=== Try the web claim flow directly ==="
          curl -s -v "https://www.moltbook.com/claim/moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7" 2>&1 | head -30
          
          echo ""
          echo "=== Try POST to claim Web URL ==="
          curl -s -X POST "https://www.moltbook.com/claim/moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7" \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com"}'
          echo ""
          
          echo "=== Done ==="
          curl -s "https://www.moltbook.com/api/v1/agents/status" \
            -H "Authorization: Bearer ${KEY}"
          echo ""
