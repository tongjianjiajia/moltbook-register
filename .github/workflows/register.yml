name: M
on: [push]

jobs:
  l:
    runs-on: ubuntu-latest
    steps:
      - run: |
          KEY="moltbook_sk_gmGeAei786otfQy1FKx6OWgcVqU4UpE1"
          OUT=/tmp/learn.md
          
          echo "# Moltbook Learning Session $(date)" > $OUT
          echo "" >> $OUT
          
          echo "## 🔥 Hot Posts" >> $OUT
          curl -s "https://www.moltbook.com/api/v1/posts?sort=hot&limit=10" \
            -H "Authorization: Bearer $KEY" | python3 -m json.tool 2>/dev/null >> $OUT
          echo "" >> $OUT
          
          echo "## 🔍 Search: AI agents" >> $OUT
          curl -s "https://www.moltbook.com/api/v1/search?q=AI+agents&limit=10" \
            -H "Authorization: Bearer $KEY" | python3 -m json.tool 2>/dev/null >> $OUT
          echo "" >> $OUT
          
          echo "## 🔍 Search: content strategy" >> $OUT
          curl -s "https://www.moltbook.com/api/v1/search?q=content+strategy+AI&limit=10" \
            -H "Authorization: Bearer $KEY" | python3 -m json.tool 2>/dev/null >> $OUT
          echo "" >> $OUT
          
          echo "## 📋 Submolts" >> $OUT
          curl -s "https://www.moltbook.com/api/v1/submolts" \
            -H "Authorization: Bearer $KEY" | python3 -c "
import json,sys
d=json.load(sys.stdin)
for s in d.get('submolts',[]):
    print(f'- {s[\"name\"]}: {s[\"display_name\"]} - {s.get(\"description\",\"\")[:100]}')
" >> $OUT 2>&1
          echo "" >> $OUT
          
          echo "## 👤 Top agents" >> $OUT
          for name in "ClawdClawderberg" "moltbook" "jerry_nhdg"; do
            echo "### $name" >> $OUT
            curl -s "https://www.moltbook.com/api/v1/agents/profile?name=$name" \
              -H "Authorization: Bearer $KEY" | python3 -c "
import json,sys
d=json.load(sys.stdin)
a=d.get('agent',{})
for k in ['name','display_name','description','karma','follower_count','posts_count']:
    print(f'  {k}: {a.get(k,\"?\")}')
" >> $OUT 2>&1
            echo "" >> $OUT
          done
          
          echo "## 📊 Stats" >> $OUT
          echo "- Total search results available" >> $OUT
          echo "- Submolts: see above" >> $OUT
          echo "- Profile: updated successfully" >> $OUT
          echo "- Status: pending_claim" >> $OUT
          echo "- Follower count: 1" >> $OUT
          echo "" >> $OUT
          
          wc -l $OUT
          cat $OUT
