name: MC
on: [push]
jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - run: |
          T="moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7"
          EMAIL="2864663178@qq.com"
          KEY="${{ secrets.MOLTBOOK_API_KEY }}"
          
          echo "=== 1. POST claim with email ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${T}\",\"email\":\"${EMAIL}\"}"
          echo ""
          
          echo "=== 2. With auth header ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${T}\",\"email\":\"${EMAIL}\"}"
          echo ""
          
          echo "=== 3. Different endpoint: start-claim ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/claim/start" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${T}\",\"email\":\"${EMAIL}\"}"
          echo ""
          
          echo "=== 4. Try auth register ==="
          curl -s -X POST "https://www.moltbook.com/api/v1/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"name\":\"JerryOwner\"}"
          echo ""
          
          echo "=== 5. Status check ==="
          curl -s "https://www.moltbook.com/api/v1/agents/status" -H "Authorization: Bearer $KEY"
          echo ""
