name: MC
on: [push]
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s "https://www.moltbook.com/claim/moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7" | python3 -c "
import sys, re
html = sys.stdin.read()
bd = re.search(r'buildId[\": ]+([a-zA-Z0-9]+)', html)
build_id = bd.group(1) if bd else 'latest'
print('BUILD:', build_id)

# Find JS files
js_files = re.findall(r'/_next/static/chunks/([a-zA-Z0-9._-]+\.js)', html)
print('JS_FILES:', len(js_files))

# Extract API paths from the JS files
import urllib.request
import json

endpoints = set()
for js in js_files[:10]:
    url = f'https://www.moltbook.com/_next/static/chunks/{js}'
    try:
        with urllib.request.urlopen(url, timeout=10) as resp:
            content = resp.read().decode('utf-8', errors='replace')
            for m in re.findall(r'[\"'"'"'](/api/v1/[a-zA-Z0-9/_-]+)[\"'"'"']', content):
                endpoints.add(m)
            for m in re.findall(r'[\"'"'"'](/auth/[a-zA-Z0-9/_-]+)[\"'"'"']', content):
                endpoints.add(m)
            for m in re.findall(r'[\"'"'"'](/claim/[a-zA-Z0-9/_-]+)[\"'"'"']', content):
                endpoints.add(m)
    except:
        pass

print('ENDPOINTS:')
for ep in sorted(endpoints):
    print('  ' + ep)
"
