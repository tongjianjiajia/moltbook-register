name: Intercept Email
on: [push]
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: |
          pip install requests 2>/dev/null
          
          # Generate temp email
          EMAIL_PREFIX="jerryverify$(date +%s)"
          EMAIL="${EMAIL_PREFIX}@guerrillamail.com"
          echo "=== Using temp email: $EMAIL ==="
          
          T="moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7"
          
          # Send verification
          echo "=== Sending verification ==="
          RESP=$(curl -s -X POST "https://www.moltbook.com/api/v1/agents/verify-email" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${EMAIL}\",\"username\":\"TestJerry\",\"claim_token\":\"${T}\"}")
          echo "$RESP"
          
          if echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
            echo ""
            echo "=== Waiting for email ==="
            sleep 30
            
            # Check guerrillamail inbox
            echo "=== Checking inbox ==="
            curl -s "https://api.guerrillamail.com/ajax.php?f=check_email&seq=0&site=guerrillamail.com&in=test123" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('list'):
    for msg in d['list']:
        print('Subject:', msg.get('mail_subject',''))
        print('From:', msg.get('mail_from',''))
        # Fetch full message
        import urllib.request
        import urllib.parse
        data = urllib.parse.urlencode({'f': 'fetch_email', 'email_id': msg['mail_id']}).encode()
        req = urllib.request.Request('https://api.guerrillamail.com/ajax.php', data=data)
        resp = urllib.request.urlopen(req).read().decode()
        full = json.loads(resp)
        body = full.get('mail_body','')
        print('Body:', body[:2000])
        # Extract URLs
        import re
        for url in re.findall(r'https?://[^\s\"<>]+', body):
            if 'moltbook' in url:
                print('LINK:', url)
else:
    print('No messages yet')
    print(json.dumps(d, indent=2)[:500])
"
          fi
