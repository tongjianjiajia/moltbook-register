name: Moltbook Status
on: [push]

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Check Moltbook
        run: |
          echo "=== Attempting registration ==="
          RESPONSE=$(curl -s -o /tmp/moltbook.json -w "%{http_code}" -X POST \
            https://www.moltbook.com/api/v1/agents/register \
            -H "Content-Type: application/json" \
            -d '{"name":"jerry_nh_agent","description":"CEO New Hope Dev Group"}')
          
          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/moltbook.json
          
          echo ""
          echo "=== Registration attempt result ==="
