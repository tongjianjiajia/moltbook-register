name: MC
on: [push]
jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== Step 1: Get temp email ==="
          EMAIL=$(curl -s "https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1" | python3 -c "import sys,json; print(json.load(sys.stdin)[0])")
          LOGIN=$(echo $EMAIL | cut -d@ -f1)
          DOMAIN=$(echo $EMAIL | cut -d@ -f2)
          echo "EMAIL=$EMAIL"
          
          echo "=== Step 2: Try register human account on moltbook ==="
          T="moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7"
          
          # Try claiming with email
          echo "--- POST claim with email ---"
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${T}\",\"email\":\"${EMAIL}\"}"
          echo ""
          
          echo "--- POST without token, just email ---"
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${EMAIL}\"}"
          echo ""
          
          echo "--- POST claim API v2 ---"
          for v in "" "/v1" "/v2"; do
            for ep in "signup" "register" "auth/register" "auth/signup" "user/register" "owner/register"; do
              R=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://www.moltbook.com/api${v}/${ep}" \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${EMAIL}\",\"password\":\"Test1234!\"}")
              if [ "$R" != "404" ] && [ "$R" != "405" ]; then
                echo "  /api${v}/${ep} -> $R"
              fi
            done
          done
          
          echo "=== Step 3: Claim with API key as owner ==="
          KEY="${{ secrets.MOLTBOOK_API_KEY }}"
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/claim" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d "{\"claim_token\":\"${T}\"}"
          echo ""
          
          echo "=== Step 4: Check email for verification ==="
          sleep 15
          curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=${LOGIN}&domain=${DOMAIN}"
          echo ""
          
          echo "=== Done ==="
          curl -s "https://www.moltbook.com/api/v1/agents/status" -H "Authorization: Bearer $KEY"
