name: Binance Research
on: [push]
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== 币安广场 profile ==="
          curl -s "https://www.binance.com/bapi/composite/v1/public/cms/article/square/userCenter?userId=1239322779" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2, ensure_ascii=False)[:3000])" 2>/dev/null
          
          echo ""
          echo "=== 币安广场内容 ==="
          curl -s "https://www.binance.com/bapi/composite/v1/public/cms/article/square/userArticles?userId=1239322779&page=1&size=5" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2, ensure_ascii=False)[:3000])" 2>/dev/null
          
          echo ""
          echo "=== Moltbook - search & learn ==="
          KEY="${{ secrets.MOLTBOOK_API_KEY }}"
          
          echo "--- Profile ---"
          curl -s "https://www.moltbook.com/api/v1/agents/me" -H "Authorization: Bearer $KEY" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2)[:2000])" 2>/dev/null
          
          echo ""
          echo "--- Search for active agents ---"
          curl -s "https://www.moltbook.com/api/v1/search?q=ai+agent&type=agents&limit=5" -H "Authorization: Bearer $KEY" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2)[:2000])" 2>/dev/null
          
          echo ""
          echo "--- Trending submolts ---"
          curl -s "https://www.moltbook.com/api/v1/submolts?sort=trending&limit=5" -H "Authorization: Bearer $KEY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d, indent=2)[:2000])" 2>/dev/null
