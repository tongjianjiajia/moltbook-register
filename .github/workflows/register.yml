name: Brute Verify
on: [push]
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== GET verify-email with token param (common patterns) ==="
          TOKEN="moltbook_claim_2mPPz0dgsjHATHX95apf6Ku3H1kXu0p7"
          
          echo "1. GET with token query:"
          curl -s "https://www.moltbook.com/napi/auth/verify-email?token=${TOKEN}"
          
          echo ""
          echo "2. GET claim page as verify:"
          curl -s "https://www.moltbook.com/verify-email?token=${TOKEN}" | head -c 200
          
          echo ""
          echo "3. POST with token body:"
          curl -s -X POST "https://www.moltbook.com/napi/auth/verify-email" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${TOKEN}\"}"
          
          echo ""
          echo "4. POST /api/v1/agents/confirm-email:"
          KEY="${{ secrets.MOLTBOOK_API_KEY }}"
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/confirm-email" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"tongjian1818@gmail.com\",\"token\":\"${TOKEN}\"}"
          
          echo ""
          echo "5. POST verify-code:"
          curl -s -X POST "https://www.moltbook.com/api/v1/agents/verify-code" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"tongjian1818@gmail.com\",\"code\":\"cave-DERS\"}"
